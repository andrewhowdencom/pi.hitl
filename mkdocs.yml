site_name: Pi HITL
site_url: https://andrewhowdencom.github.io/pi.hitl/
repo_url: https://github.com/andrewhowdencom/pi.hitl
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

docs_dir: docs

nav:
  - Home: index.md
  - Tutorials:
    - Getting Started: tutorials/getting-started.md
  - How-to Guides:
    - Allow harmless tools without approval: how-to/allow-harmless-tools.md
    - Handle MCP-CLI calls through bash: how-to/handle-mcp-cli-calls.md
  - Reference:
    - YAML configuration schema: reference/config-schema.md
    - CEL variables and functions: reference/cel-variables.md
    - /permissions CLI commands: reference/commands.md
  - Explanation:
    - Architecture and design rationale: explanation/architecture.md

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
